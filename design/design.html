<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Designer</title>
<link rel="stylesheet" href="design.css">
</head>
<body>
  <button id="menu-toggle" aria-label="Toggle controls" aria-controls="controls" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div id="menu-backdrop" hidden></div>
  <aside id="controls">
    <h1>Building Designer</h1>

    <h2>Shape</h2>
    <div class="field"><span class="lbl">Footprint</span>
      <select id="shape">
        <option value="rectangle">Rectangle</option>
        <option value="L">L-shape</option>
        <option value="U">U-shape</option>
        <option value="T">T-shape</option>
      </select>
    </div>
    <div class="row">
      <div class="field"><span class="lbl">Width (m)</span><input type="number" id="width" min="3" max="60" step="0.5" value="12"></div>
      <div class="field"><span class="lbl">Depth (m)</span><input type="number" id="depth" min="3" max="60" step="0.5" value="9"></div>
    </div>
    <div class="row" id="notch-row" style="display:none;">
      <div class="field"><span class="lbl">Notch W</span><input type="number" id="notchWidth" min="1" max="50" step="0.5" value="5"></div>
      <div class="field"><span class="lbl">Notch D</span><input type="number" id="notchDepth" min="1" max="50" step="0.5" value="4"></div>
    </div>

    <h2>Floors</h2>
    <div class="row">
      <div class="field"><span class="lbl">Count</span><input type="number" id="floors" min="1" max="20" step="1" value="2"></div>
      <div class="field"><span class="lbl">Height (m)</span><input type="number" id="floorHeight" min="2" max="6" step="0.1" value="3"></div>
    </div>

    <h2>Roof</h2>
    <div class="field"><span class="lbl">Type</span>
      <select id="roof">
        <option value="flat">Flat</option>
        <option value="gable">Gable (rect only)</option>
        <option value="hip">Hip</option>
      </select>
    </div>
    <div class="field"><span class="lbl">Pitch (m)</span><input type="number" id="roofPitch" min="0" max="6" step="0.1" value="1.8"></div>

    <h2>Openings</h2>
    <div class="field"><span class="lbl">Windows per floor</span><input type="number" id="windowCount" min="0" max="40" step="1" value="10"></div>
    <div class="row">
      <div class="field"><span class="lbl">W (m)</span><input type="number" id="windowWidth" min="0.4" max="3" step="0.1" value="1.2"></div>
      <div class="field"><span class="lbl">H (m)</span><input type="number" id="windowHeight" min="0.4" max="3" step="0.1" value="1.4"></div>
    </div>
    <div class="field"><span class="lbl">Door position (front)</span><input type="range" id="doorPos" min="-0.45" max="0.45" step="0.01" value="0"></div>

    <h2>Style</h2>
    <div class="field"><span class="lbl">Render</span>
      <select id="style">
        <option value="clean">Clean</option>
        <option value="realistic">Realistic</option>
      </select>
    </div>
    <div class="row">
      <div class="field"><span class="lbl">Walls</span><input type="color" id="wallColor" value="#e8dfcc"></div>
      <div class="field"><span class="lbl">Roof</span><input type="color" id="roofColor" value="#5d4a3a"></div>
    </div>
    <div class="field"><span class="lbl">Glass (windows + door)</span><input type="color" id="glassColor" value="#36506e"></div>

    <h2>Export / Import</h2>
    <button id="exportImg">Export PNG (3D)</button>
    <button id="exportJson" class="secondary">Export JSON</button>
    <button id="importJson" class="secondary">Import JSON</button>
  </aside>

  <main id="views">
    <div class="vp vp-3d"><span class="label">3D</span><canvas id="cv-3d"></canvas></div>
    <div class="vp vp-top"><span class="label">Top</span><canvas id="cv-top"></canvas></div>
    <div class="vp vp-front"><span class="label">Front</span><canvas id="cv-front"></canvas></div>
    <div class="vp vp-side"><span class="label">Side</span><canvas id="cv-side"></canvas></div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="design.js"></script>
</body>
</html>
