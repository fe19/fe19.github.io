<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slingshot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="slingshot.css">
</head>
<body>
  <div id="site-header"></div>
  <script src="../header/header.js"></script>

  <div id="game-wrap" class="game-wrap">
    <div class="hud">
      <div class="hud-panel">
        <div class="hud-title">Slingshot</div>
        <div class="hud-level">Level <span id="level-num">1</span>/<span id="level-count">6</span> — <span id="level-name"></span></div>
        <div class="hud-stats">
          Strokes <b id="strokes">0</b> · Par <b id="par">0</b> · Total <b id="total">0</b>
        </div>
        <button id="reset-btn" class="btn btn-sm btn-outline-info mt-2">Reset level</button>
      </div>
      <div class="hud-hint" id="hint">
        Drag from the <b>white ball</b> to aim, release to launch.
        Gravity bends your shot around planets — reach the cyan ring.
        Drag empty space to orbit the camera, scroll to zoom.
      </div>
    </div>

    <div class="overlay d-none" id="overlay">
      <div class="overlay-card">
        <h2 id="overlay-title">Goal!</h2>
        <p id="overlay-text"></p>
        <button id="next-btn" class="btn btn-info">Next level</button>
      </div>
    </div>

    <div id="toast" class="game-toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="slingshot.js"></script>
</body>
</html>
