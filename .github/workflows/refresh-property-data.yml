name: Refresh property data

on:
  schedule:
    - cron: '17 4 * * *'   # daily at 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: github.repository == 'fe19/fe19.github.io'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh data-live.js from BFS IMPI
        run: node property/refresh-data.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet property/data-live.js; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add property/data-live.js
          git commit -m "Refresh property data from BFS IMPI"
          git push
