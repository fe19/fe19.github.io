name: Refresh stock data

on:
  schedule:
    - cron: '30 21 * * 1-5'   # Mon-Fri at 21:30 UTC, after the US market close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: github.repository == 'fe19/fe19.github.io'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh data-live.js from Yahoo Finance
        run: node stockspikes/refresh-data.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet stockspikes/data-live.js; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stockspikes/data-live.js
          git commit -m "Refresh stock data from Yahoo Finance"
          git push
