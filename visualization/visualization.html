<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Measurements Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="../css/style.css" rel="stylesheet">
    <link href="visualization.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-md tab-nav sticky-top">
        <div class="container">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="mainNav">
                <ul class="navbar-nav nav-pills py-2">
                    <li class="nav-item ms-md-2"><a href="visualization.html" class="nav-link active">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="px-4 py-2 my-3 text-center">
        <h1 class="display-5 fw-bold text-body-emphasis">Measurements</h1>
    </div>

    <div class="container pb-5">
        <div class="toolbar card p-3 mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-auto">
                    <label class="btn btn-outline-info mb-0">
                        Load CSV
                        <input type="file" id="file-input" accept=".csv" hidden>
                    </label>
                    <button id="reset-btn" type="button" class="btn btn-outline-secondary">Reset to default</button>
                </div>
                <div class="col-12 col-md-auto">
                    <div class="source-filters d-flex flex-wrap gap-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="src-static" value="Static" checked><label class="form-check-label" for="src-static">Static</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="src-mixed" value="Mixed" checked><label class="form-check-label" for="src-mixed">Mixed</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" id="src-wifi" value="WiFi/Phone" checked><label class="form-check-label" for="src-wifi">WiFi/Phone</label></div>
                    </div>
                </div>
                <div class="col-12 col-md text-md-end">
                    <span id="status" class="text-muted small">Loading…</span>
                </div>
            </div>
        </div>

        <div class="card mb-3"><div class="card-body">
            <div class="chart-header">
                <h5 class="card-title mb-0">EF (V/m)</h5>
                <div class="y-range">
                    <label>Min <input type="number" data-chart="ef" data-bound="min" value="0" step="0.1"></label>
                    <label>Max <input type="number" data-chart="ef" data-bound="max" value="5" step="0.1"></label>
                    <label>Smooth <input type="number" data-chart="ef" data-bound="smooth" value="1" min="1" step="1"></label>
                </div>
            </div>
            <div class="chart-wrap"><canvas id="chart-ef"></canvas></div>
        </div></div>
        <div class="card mb-3"><div class="card-body">
            <div class="chart-header">
                <h5 class="card-title mb-0">EMF (mG)</h5>
                <div class="y-range">
                    <label>Min <input type="number" data-chart="emf" data-bound="min" value="0" step="0.1"></label>
                    <label>Max <input type="number" data-chart="emf" data-bound="max" value="2" step="0.1"></label>
                    <label>Smooth <input type="number" data-chart="emf" data-bound="smooth" value="1" min="1" step="1"></label>
                </div>
            </div>
            <div class="chart-wrap"><canvas id="chart-emf"></canvas></div>
        </div></div>
        <div class="card mb-4"><div class="card-body">
            <div class="chart-header">
                <h5 class="card-title mb-0">RF Power Density (mW/m²)</h5>
                <div class="y-range">
                    <label>Min <input type="number" data-chart="rf" data-bound="min" value="0" step="1"></label>
                    <label>Max <input type="number" data-chart="rf" data-bound="max" value="50" step="1"></label>
                    <label>Smooth <input type="number" data-chart="rf" data-bound="smooth" value="1" min="1" step="1"></label>
                </div>
            </div>
            <div class="chart-wrap"><canvas id="chart-rf"></canvas></div>
        </div></div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Summary</h5>
                <div class="table-responsive">
                    <table class="table table-sm align-middle mb-0">
                        <thead>
                            <tr><th>Metric</th><th class="text-end">Count</th><th class="text-end">Min</th><th class="text-end">Max</th><th class="text-end">Mean</th><th class="text-end">Median</th><th class="text-end">p95</th></tr>
                        </thead>
                        <tbody id="summary-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="visualization.js" defer></script>
</body>
</html>
