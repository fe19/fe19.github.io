<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Swiss Property Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="../style.css" rel="stylesheet">
    <link href="property.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>
    <script src="../header/header.js"></script>

<div class="px-4 py-2 my-3 text-center">
    <h1 class="display-5 fw-bold text-body-emphasis">Swiss Property Search</h1>
    <p class="lead text-muted">Find properties to buy across Switzerland and export your shortlist as JSON.</p>
</div>

<div class="container mb-5">

    <!-- ════ Search filters ════ -->
    <form id="search-form" class="card shadow-sm p-3 p-md-4 mb-4">
        <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-3">
                <label for="f-canton" class="form-label">Canton</label>
                <select id="f-canton" class="form-select">
                    <option value="">Any canton</option>
                </select>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <label for="f-type" class="form-label">Property type</label>
                <select id="f-type" class="form-select">
                    <option value="">Any type</option>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                    <option value="Penthouse">Penthouse / Attic</option>
                    <option value="Multi-family">Multi-family</option>
                    <option value="Plot">Plot / Land</option>
                </select>
            </div>

            <div class="col-6 col-md-3 col-lg-3">
                <label for="f-price-min" class="form-label">Price min (CHF)</label>
                <input type="number" id="f-price-min" class="form-control" min="0" step="50000" placeholder="0">
            </div>

            <div class="col-6 col-md-3 col-lg-3">
                <label for="f-price-max" class="form-label">Price max (CHF)</label>
                <input type="number" id="f-price-max" class="form-control" min="0" step="50000" placeholder="No max">
            </div>

            <div class="col-6 col-md-3 col-lg-3">
                <label for="f-rooms-min" class="form-label">Rooms (min)</label>
                <select id="f-rooms-min" class="form-select">
                    <option value="">Any</option>
                    <option value="1">1+</option>
                    <option value="2">2+</option>
                    <option value="2.5">2.5+</option>
                    <option value="3">3+</option>
                    <option value="3.5">3.5+</option>
                    <option value="4">4+</option>
                    <option value="4.5">4.5+</option>
                    <option value="5">5+</option>
                    <option value="6">6+</option>
                </select>
            </div>

            <div class="col-6 col-md-3 col-lg-3">
                <label for="f-space-min" class="form-label">Living space min (m²)</label>
                <input type="number" id="f-space-min" class="form-control" min="0" step="10" placeholder="0">
            </div>

            <div class="col-6 col-md-3 col-lg-3">
                <label for="f-year-min" class="form-label">Built from (year)</label>
                <input type="number" id="f-year-min" class="form-control" min="1800" max="2030" step="1" placeholder="Any">
            </div>

            <div class="col-12 col-lg-3 d-flex align-items-end gap-2">
                <button type="submit" class="btn btn-info text-white flex-grow-1">Search</button>
                <button type="reset" class="btn btn-outline-secondary">Reset</button>
            </div>
        </div>
    </form>

    <!-- ════ Results toolbar ════ -->
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <h2 class="h5 mb-0" id="result-count">Use the filters above and press Search</h2>
        <button id="save-json" class="btn btn-outline-info" disabled>Save as JSON</button>
    </div>

    <!-- ════ Results list ════ -->
    <div id="results" class="row g-3"></div>
    <p id="no-results" class="text-muted fst-italic text-center my-5 d-none">
        No properties match these filters. Try widening your search.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="property.js"></script>

</body>
</html>
